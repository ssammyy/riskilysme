# Complete application on Docker (DB + Backend + Frontend).
#
#   Running the full stack on Docker:
#       docker compose up --build -d
#
#   Running only the database locally for host-side development (IDE + Vite):
#       docker compose up db -d
#
# Frontend is served on port 80 and reverse-proxies /api requests to the backend.

services:
  db:
    image: postgres:16-alpine
    platform: linux/amd64
    container_name: riskily-sme-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-riskily_sme}
      POSTGRES_USER: ${POSTGRES_USER:-riskily}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-riskily}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - sme_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-riskily} -d ${POSTGRES_DB:-riskily_sme}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: samik254/riskily-backend:latest
    platform: linux/amd64
    build: ./backend
    container_name: riskily-sme-backend
    entrypoint: ["java", "-Xms128m", "-Xmx192m", "-XX:MaxMetaspaceSize=96m", "-jar", "app.jar"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-riskily_sme}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-riskily}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-riskily}
      JWT_SECRET: ${JWT_SECRET:-change-me-dev-secret-change-me-dev-secret-32b}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
    ports:
      - "${SERVER_PORT:-8080}:8080"

  frontend:
    image: samik254/riskily-frontend:latest
    platform: linux/amd64
    build: ./frontend
    container_name: riskily-sme-frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  sme_pgdata:
