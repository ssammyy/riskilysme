spring:
  application:
    name: riskily-sme
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/riskily_sme}
    username: ${SPRING_DATASOURCE_USERNAME:riskily}
    password: ${SPRING_DATASOURCE_PASSWORD:riskily}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Africa/Nairobi
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  mail:
    host: ${MAIL_HOST:smtp.resend.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:resend}
    password: ${MAIL_PASSWORD:${RESEND_API_KEY:your-resend-api-key-here}}
    from: ${MAIL_FROM:hello@riskily.africa}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

riskily:
  app:
    base-url: ${APP_BASE_URL:http://localhost:5173}
  auth:
    jwt-secret: ${JWT_SECRET:change-me-dev-secret-change-me-dev-secret-32b}
    access-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:15}
    refresh-ttl-days: ${JWT_REFRESH_TTL_DAYS:14}
  admin:
    email: ${ADMIN_EMAIL:admin@riskily.africa}
    password: ${ADMIN_PASSWORD:changeme-admin-pass}
  ai:
    claude-api-key: ${CLAUDE_API_KEY:your-anthropic-api-key-here}
    model: ${CLAUDE_MODEL:claude-haiku-4-5-20251001}
    enabled: ${AI_INSIGHTS_ENABLED:true}

logging:
  level:
    org.flywaydb: info
